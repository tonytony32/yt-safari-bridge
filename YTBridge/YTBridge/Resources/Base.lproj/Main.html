<!DOCTYPE html>
<html>
<head>
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; img-src 'self' https://i.ytimg.com https://music.youtube.com https://*.googleusercontent.com">

    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">

    <link rel="stylesheet" href="../Style.css">
    <script src="../Script.js" defer></script>
</head>
<body>
    <img src="../Icon.png" width="128" height="128" alt="YTBridge Icon">
    <p class="state-unknown">You can turn on YTBridge’s extension in Safari Extensions preferences.</p>
    <p class="state-on">YTBridge’s extension is currently on. You can turn it off in Safari Extensions preferences.</p>
    <p class="state-off">YTBridge’s extension is currently off. You can turn it on in Safari Extensions preferences.</p>
    <button class="open-preferences">Quit and Open Safari Extensions Preferences…</button>

    <hr>
    <h3>Bridge status</h3>
    <img id="artwork" alt="Current track cover art" title="Double-click to bring the YouTube tab to the front" hidden>
    <p id="server-line">Checking the local bridge…</p>
    <p id="track-line"></p>
    <button class="refresh">Refresh</button>
</body>
</html>
